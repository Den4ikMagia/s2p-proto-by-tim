# Сборка и публикация на GitHub Pages (ветка gh-pages не нужна — используется Actions).
# После первого пуша: Settings → Pages → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Подпапка сайта: https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
      # Иначе в Settings → Pages часто остаётся «Deploy from branch» и отдаётся сырой index.html с /src/main.jsx → белый экран.
      - name: Verify bundle (not dev index.html)
        run: |
          test -s dist/index.html
          grep -qE 'assets/index-.*\.js|/assets/index-.*\.js' dist/index.html || {
            echo "::error::dist/index.html must reference built /assets/*.js — check Vite build and Pages source (use GitHub Actions, not branch / root)."
            cat dist/index.html
            exit 1
          }
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
